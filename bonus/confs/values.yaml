global:
  hosts:
    domain: gitlab.local
    https: false
  ingress:
    configureCertmanager: false
    tls:
      enabled: false
  shell:
    port: 32022

certmanager:
  install: false
nginx-ingress:
  enabled: false
prometheus:
  install: false
gitlab-runner:
  install: false
registry:
  enabled: false

# Reduce resource pressure on a single-node cluster
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
